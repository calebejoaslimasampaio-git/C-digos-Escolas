<!DOCTYPE html>
<html lang= pt-br>
<html>
<head>
    <meta charset="UTF-8">
    <meta name = "viewport" content="width=device-width,initial-escale=1.0">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="style2.css/style.css">
</head>
<body>
    <div id="div">
    <h1>Cadastro de Alunos</h1>
    <!-- FORM CADASTRO -->
    <label>Matrícula: <input type="text" id="matricula"></label>
    <label>Nome: <input type="text" id="nome"></label>
    <label>Curso: <input type="text" id="curso"></label>
    <label>Escola: <input type="text" id="escola"></label>

    <button onclick="cadastrarAluno()">Cadastrar</button>
    
    <!-- LISTA -->
    <h2>Alunos Cadastrados (<span id="totalAlunoss">0</span>)</h2>
    <ul id="listaAlunos"></ul>
    <button onclick="mostrarEstatisticas()">Estatísticas</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
